  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n      --light:   #a0d4ee;\n      --silver:  #dce8f5;\n      --gold:    #c8a830;\n      --gold-lt: #e8d070;\n    }\n\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    body {\n      background: var(--bg);\n      min-height: 100vh;\n      display: flex;\n      align-items: flex-start;\n      justify-content: center;\n      padding: 48px 20px 80px;\n      font-family: 'Raleway', sans-serif;\n      overflow-x: hidden;\n    }\n\n    /* ── CANVAS BACKGROUND ── */\n    #bg-canvas {\n      position: fixed;\n      inset: 0;\n      z-index: 0;\n      pointer-events: none;\n    }\n\n    /* ── BUBBLES ── */\n    #bubbles {\n      position: fixed;\n      inset: 0;\n      z-index: 1;\n      pointer-events: none;\n      overflow: hidden;\n    }\n    .bub {\n      position: absolute;\n      bottom: -30px;\n      border-radius: 50%;\n      background: radial-gradient(circle at 33% 30%, rgba(255,255,255,0.45), rgba(0,200,230,0.04));\n      border: 1px solid rgba(80,210,240,0.28);\n      animation: rise linear infinite;\n    }\n    @keyframes rise {\n      from { transform: translateY(0) translateX(0); opacity: 0; }\n      8%   { opacity: 0.65; }\n      88%  { opacity: 0.3; }\n      to   { transform: translateY(-110vh) translateX(var(--drift, 0px)); opacity: 0; }\n    }\n\n    /* ── CARD ── */\n    .wrap {\n      position: relative;\n      z-index: 10;\n      width: 100%;\n      max-width: 580px;\n    }\n\n    .card {\n      position: relative;\n      background: linear-gradient(170deg,\n        rgba(4,20,42,0.99) 0%,\n        rgba(2,12,24,0.99) 50%,\n        rgba(4,20,42,0.99) 100%\n      );\n      border: 1px solid rgba(0,196,222,0.22);\n      border-radius: 2px;\n      padding: 52px 48px 44px;\n      overflow: hidden;\n      box-shadow:\n        0 0 0 1px rgba(0,196,222,0.07),\n        0 8px 80px rgba(0,90,150,0.55),\n        0 0 140px rgba(0,60,120,0.25),\n        inset 0 0 100px rgba(0,50,90,0.12);\n    }\n\n    .card::before {\n      content: '';\n      position: absolute;\n      top: -40px;\n      left: 50%;\n      transform: translateX(-50%);\n      width: 360px;\n      height: 250px;\n      background: radial-gradient(ellipse, rgba(0,196,222,0.11) 0%, transparent 70%);\n      pointer-events: none;\n      z-index: 0;\n    }\n\n    /* Ripple animation */\n    @keyframes rippleOut {\n      from { width: 0; height: 0; opacity: 0.7; }\n      to   { width: 250px; height: 250px; opacity: 0; }\n    }\n\n    /* ── CORNERS ── */\n    .crn {\n      position: absolute;\n      width: 46px;\n      height: 46px;\n      z-index: 5;\n    }\n    .crn.tl { top: 14px; left: 14px; }\n    .crn.tr { top: 14px; right: 14px; transform: scaleX(-1); }\n    .crn.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }\n    .crn.br { bottom: 14px; right: 14px; transform: scale(-1,-1); }\n\n    .inner {\n      position: relative;\n      z-index: 2;\n    }\n\n    /* ── EMBLEM ── */\n    .emblem-wrap { display: flex; justify-content: center; margin-bottom: 20px; }\n    .emblem-svg {\n      width: 130px;\n      height: 130px;\n      animation: embPulse 3.5s ease-in-out infinite;\n    }\n    @keyframes embPulse {\n      0%,100% { filter: drop-shadow(0 0 14px rgba(0,196,228,0.85)) drop-shadow(0 0 36px rgba(0,150,210,0.45)); }\n      50%      { filter: drop-shadow(0 0 26px rgba(30,220,255,1.0)) drop-shadow(0 0 54px rgba(0,180,230,0.65)); }\n    }\n\n    /* ── TYPE ── */\n    .eyebrow {\n      font-family: 'Cinzel', serif;\n      font-size: 10px;\n      letter-spacing: 0.38em;\n      color: var(--cyan);\n      text-align: center;\n      text-transform: uppercase;\n      margin-bottom: 12px;\n      opacity: 0.75;\n    }\n\n    .title {\n      font-family: 'Cinzel Decorative', serif;\n      font-weight: 900;\n      font-size: clamp(38px, 8vw, 52px);\n      text-align: center;\n      color: var(--silver);\n      line-height: 1.05;\n      letter-spacing: 0.02em;\n      margin-bottom: 10px;\n      text-shadow: 0 0 28px rgba(0,196,228,0.7), 0 0 56px rgba(0,140,200,0.35);\n    }\n    .title .amp {\n      color: var(--gold-lt);\n      font-size: 0.82em;\n    }\n\n    .ages {\n      font-family: 'Cinzel', serif;\n      font-size: 12px;\n      letter-spacing: 0.22em;\n      color: var(--light);\n      text-align: center;\n      margin-bottom: 8px;\n    }\n    .ages b { color: var(--bright); }\n\n    .party-tag {\n      font-family: 'Cinzel', serif;\n      font-size: 16px;\n      font-weight: 700;\n      letter-spacing: 0.25em;\n      color: var(--gold-lt);\n      text-transform: uppercase;\n      text-align: center;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      gap: 14px;\n      margin-top: 2px;\n    }\n    .party-tag .st { color: var(--cyan); font-size: 11px; }\n\n    /* ── DIVIDERS ── */\n    .div {\n      display: flex;\n      align-items: center;\n      gap: 12px;\n      margin: 26px 0;\n    }\n    .div::before {\n      content: '';\n      flex: 1;\n      height: 1px;\n      background: linear-gradient(to right, transparent, rgba(0,196,222,0.5));\n    }\n    .div::after {\n      content: '';\n      flex: 1;\n      height: 1px;\n      background: linear-gradient(to left, transparent, rgba(0,196,222,0.5));\n    }\n    .div-icon { color: var(--cyan); opacity: 0.7; flex-shrink: 0; }\n\n    /* ── DETAILS ── */\n    .details { display: flex; flex-direction: column; gap: 18px; }\n    .di { display: flex; align-items: flex-start; gap: 16px; }\n    .di-ico {\n      width: 40px; height: 40px;\n      flex-shrink: 0;\n      border-radius: 50%;\n      background: rgba(0,90,130,0.25);\n      border: 1px solid rgba(0,196,222,0.3);\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n    .di-ico svg { width: 19px; height: 19px; }\n    .di-body { flex: 1; padding-top: 4px; }\n    .di-lbl {\n      font-family: 'Cinzel', serif;\n      font-size: 9px;\n      letter-spacing: 0.32em;\n      text-transform: uppercase;\n      color: var(--cyan);\n      margin-bottom: 3px;\n      opacity: 0.65;\n    }\n    .di-val {\n      font-size: 15.5px;\n      font-weight: 600;\n      color: var(--silver);\n      line-height: 1.3;\n    }\n    .di-sub {\n      font-size: 13px;\n      color: var(--light);\n      opacity: 0.78;\n      margin-top: 2px;\n    }\n\n    /* ── PARENTS BOX ── */\n    .pbox {\n      background: rgba(4,32,60,0.55);\n      border: 1px solid rgba(0,196,222,0.18);\n      border-radius: 2px;\n      padding: 24px 26px;\n    }\n    .pbox-lbl {\n      font-family: 'Cinzel', serif;\n      font-size: 9.5px;\n      letter-spacing: 0.35em;\n      text-transform: uppercase;\n      color: var(--gold-lt);\n      margin-bottom: 14px;\n      opacity: 0.9;\n    }\n    .pbox-note {\n      font-size: 13.5px;\n      line-height: 1.78;\n      color: var(--light);\n      font-style: italic;\n      margin-bottom: 22px;\n    }\n    .pbox-note b { color: var(--silver); font-style: normal; }\n\n    /* Radio styled as check square */\n    .choices { display: flex; flex-direction: column; gap: 14px; }\n    .choice { display: flex; align-items: center; gap: 14px; cursor: pointer; }\n    .choice input[type=\"radio\"] {\n      appearance: none; -webkit-appearance: none;\n      width: 22px; height: 22px;\n      border: 1.5px solid rgba(0,196,222,0.5);\n      border-radius: 2px;\n      background: rgba(0,50,90,0.3);\n      cursor: pointer;\n      flex-shrink: 0;\n      position: relative;\n      transition: background .15s, border-color .15s;\n    }\n    .choice input[type=\"radio\"]:hover { border-color: var(--cyan); }\n    .choice input[type=\"radio\"]:checked {\n      background: rgba(0,196,222,0.22);\n      border-color: var(--cyan);\n    }\n    .choice input[type=\"radio\"]:checked::after {\n      content: '';\n      position: absolute;\n      top: 3px; left: 6px;\n      width: 6px; height: 10px;\n      border-right: 2px solid var(--cyan);\n      border-bottom: 2px solid var(--cyan);\n      transform: rotate(40deg);\n    }\n    .choice-lbl {\n      font-size: 14px;\n      font-weight: 500;\n      color: var(--silver);\n      line-height: 1.45;\n      cursor: pointer;\n    }\n    .choice-lbl em {\n      font-size: 12.5px;\n      color: var(--light);\n      font-weight: 400;\n    }\n\n    /* ── RSVP ── */\n    .rsvp { text-align: center; }\n    .rsvp-lbl {\n      font-family: 'Cinzel', serif;\n      font-size: 9.5px;\n      letter-spacing: 0.38em;\n      text-transform: uppercase;\n      color: var(--cyan);\n      margin-bottom: 10px;\n      opacity: 0.65;\n    }\n    .rsvp-main {\n      font-size: 15px;\n      font-weight: 600;\n      color: var(--silver);\n      margin-bottom: 6px;\n    }\n    .rsvp-contact {\n      font-size: 13.5px;\n      color: var(--light);\n      line-height: 1.85;\n      margin-bottom: 22px;\n    }\n    .ph { color: rgba(140,200,230,0.4); font-style: italic; }\n    .closing {\n      font-family: 'Cinzel', serif;\n      font-size: 11px;\n      letter-spacing: 0.14em;\n      color: var(--gold);\n      opacity: 0.75;\n      line-height: 1.65;\n    }\n\n    /* ── PRINT BUTTON ── */\n    .print-btn {\n      position: fixed;\n      bottom: 24px;\n      right: 24px;\n      z-index: 100;\n      background: rgba(0,196,222,0.12);\n      border: 1px solid rgba(0,196,222,0.45);\n      border-radius: 2px;\n      color: var(--cyan);\n      font-family: 'Cinzel', serif;\n      font-size: 10.5px;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      padding: 10px 18px;\n      cursor: pointer;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n      transition: background .2s, box-shadow .2s;\n    }\n    .print-btn:hover {\n      background: rgba(0,196,222,0.25);\n      box-shadow: 0 0 18px rgba(0,196,222,0.3);\n    }\n\n    /* ── PRINT STYLES ── */\n    @media print {\n      body { background: white !important; padding: 0; }\n      #bg-canvas, #bubbles, .print-btn { display: none !important; }\n      .card {\n        background: white !important;\n 2\"><\u002Fpath>\n          <path d=\"M92,160 C90,174 92,186 100,196 C108,186 110,174 108,160 Z\" fill=\"url(#finGrad)\" stroke=\"#00c4de\" stroke-width=\"1\" opacity=\"0.92\"><\u002Fpath>\n          <path d=\"M160,92 C174,90 186,92 196,100 C186,108 174,110 160,108 Z\" fill=\"url(#finGrad)\" stroke=\"#00c4de\" stroke-width=\"1\" opacity=\"0.92\"><\u002Fpath>\n          <path d=\"M40,92 C26,90 14,92 4,100 C14,108 26,110 40,108 Z\" fill=\"url(#finGrad)\" stroke=\"#00c4de\" stroke-width=\"1\" opacity=\"0.92\"><\u002Fpath>\n\n          <!-- Inner circle -->\n          <circle cx=\"100\" cy=\"100\" r=\"67\" fill=\"rgba(2,12,26,0.65)\" stroke=\"#00c4de\" stroke-width=\"1.2\"><\u002Fcircle>\n          <circle cx=\"100\" cy=\"100\" r=\"60\" fill=\"none\" stroke=\"#007888\" stroke-width=\"0.6\" opacity=\"0.45\"><\u002Fcircle>\n\n          <!-- Cardinal accent dots on inner ring -->\n          <circle cx=\"100\" cy=\"33\" r=\"3.5\" fill=\"#00c4de\" opacity=\"0.82\"><\u002Fcircle>\n          <circle cx=\"167\" cy=\"100\" r=\"3.5\" fill=\"#00c4de\" opacity=\"0.82\"><\u002Fcircle>\n          <circle cx=\"100\" cy=\"167\" r=\"3.5\" fill=\"#00c4de\" opacity=\"0.82\"><\u002Fcircle>\n          <circle cx=\"33\" cy=\"100\" r=\"3.5\" fill=\"#00c4de\" opacity=\"0.82\"><\u002Fcircle>\n\n          <!-- Wave arcs -->\n          <path d=\"M46,96 Q58,85 70,96 Q82,107 94,96 Q106,85 118,96 Q130,107 142,96 Q150,90 154,96\" fill=\"none\" stroke=\"#0090b0\" stroke-width=\"1.1\" opacity=\"0.5\"><\u002Fpath>\n          <path d=\"M46,106 Q58,95 70,106 Q82,117 94,106 Q106,95 118,106 Q130,117 142,106 Q150,100 154,106\" fill=\"none\" stroke=\"#006878\" stroke-width=\"0.9\" opacity=\"0.33\"><\u002Fpath>\n\n          <!-- CENTRAL GEM — Zora's Sapphire -->\n          <polygon points=\"100,57 116,79 122,100 116,121 100,143 84,121 78,100 84,79\" fill=\"url(#gemFill)\" stroke=\"#88e4ff\" stroke-width=\"1.3\" filter=\"url(#glow)\"><\u002Fpolygon>\n          <!-- Facet lines -->\n          <line x1=\"100\" y1=\"57\" x2=\"100\" y2=\"143\" stroke=\"rgba(210,248,255,0.22)\" stroke-width=\"0.8\"><\u002Fline>\n          <line x1=\"78\" y1=\"100\" x2=\"122\" y2=\"100\" stroke=\"rgba(210,248,255,0.22)\" stroke-width=\"0.8\"><\u002Fline>\n          <line x1=\"84\" y1=\"79\" x2=\"116\" y2=\"121\" stroke=\"rgba(210,248,255,0.13)\" stroke-width=\"0.6\"><\u002Fline>\n          <line x1=\"116\" y1=\"79\" x2=\"84\" y2=\"121\" stroke=\"rgba(210,248,255,0.13)\" stroke-width=\"0.6\"><\u002Fline>\n          <!-- Crown highlight -->\n          <polygon points=\"100,57 113,79 100,72 87,79\" fill=\"rgba(242,254,255,0.52)\"><\u002Fpolygon>\n          <!-- Inner glow -->\n          <ellipse cx=\"99\" cy=\"94\" rx=\"11\" ry=\"14\" fill=\"rgba(160,232,255,0.18)\"><\u002Fellipse>\n        <\u002Fsvg>\n      <\u002Fdiv>\n\n      <!-- EYEBROW -->\n      <p class=\"eyebrow\">From the Waters of Zora's Domain<\u002Fp>\n\n      <!-- TITLE -->\n      <h1 class=\"title\">Eddy <span class=\"amp\">&amp;<\u002Fspan> Felix<\u002Fh1>\n\n      <!-- AGES -->\n      <p class=\"ages\">Turning <b>10<\u002Fb> &amp; <b>7<\u002Fb> splashes around the sun<\u002Fp>\n\n      <!-- PARTY TAG -->\n      <p class=\"party-tag\">\n        <span class=\"st\">✦<\u002Fspan>\n        Pool Party\n        <span class=\"st\">✦<\u002Fspan>\n      <\u002Fp>\n\n      <!-- DIVIDER 1 -->\n      <div class=\"div\">\n        <div class=\"div-icon\">\n          <svg width=\"60\" height=\"14\" viewBox=\"0 0 60 14\" fill=\"none\">\n            <path d=\"M0,7 Q7.5,1 15,7 Q22.5,13 30,7 Q37.5,1 45,7 Q52.5,13 60,7\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DETAILS -->\n      <div class=\"details\">\n\n        <div class=\"di\">\n          <div class=\"di-ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00c4de\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n              <rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect>\n              <line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"><\u002Fline>\n              <line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"6\"><\u002Fline>\n              <line x1=\"16\" y1=\"2\" x2=\"16\" y2=\"6\"><\u002Fline>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"di-body\">\n            <div class=\"di-lbl\">Date<\u002Fdiv>\n            <div class=\"di-val\">Sunday, 5th July 2026<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"di\">\n          <div class=\"di-ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00c4de\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n              <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n              <polyline points=\"12,7 12,12 15.5,14.5\"><\u002Fpolyline>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"di-body\">\n            <div class=\"di-lbl\">Time<\u002Fdiv>\n            <div class=\"di-val\">Arrive 4:50pm — Session starts 5:00pm<\u002Fdiv>\n            <div class=\"di-sub\">Session ends promptly at 5:50pm - pick up at 6:00pm<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"di\">\n          <div class=\"di-ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00c4de\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n              <path d=\"M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z\"><\u002Fpath>\n              <circle cx=\"12\" cy=\"9\" r=\"2.5\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"di-body\">\n            <div class=\"di-lbl\">Venue<\u002Fdiv>\n            <div class=\"di-val\"><span class=\"ph\" style=\"color: rgb(220, 232, 245); font-family: Raleway\">Huntingdon One Leisure Centre&nbsp;<\u002Fspan><\u002Fdiv>\n            <div class=\"di-sub\"><span class=\"ph\"><span style=\"color: #a0d4ee;\">St Peters Rd, Huntingdon PE29 7DA<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"di\">\n          <div class=\"di-ico\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#00c4de\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M2,15 C5,13 7,17 10,15 C13,13 15,17 18,15 C19.5,14.2 20.5,14 22,15\"><\u002Fpath>\n              <path d=\"M2,19 C5,17 7,21 10,19 C13,17 15,21 18,19 C19.5,18.2 20.5,18 22,19\"><\u002Fpath>\n              <circle cx=\"11\" cy=\"7\" r=\"2\"><\u002Fcircle>\n              <path d=\"M15,9.5 C15.5,7.5 17.5,6 19.5,5.5\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"di-body\">\n            <div class=\"di-lbl\">Don't Forget<\u002Fdiv>\n            <div class=\"di-val\">Swimwear &amp; towel<\u002Fdiv>\n            <div class=\"di-sub\">...and your adventuring spirit!<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- DIVIDER 2 -->\n      <div class=\"div\">\n        <div class=\"div-icon\">\n          <svg width=\"20\" height=\"26\" viewBox=\"0 0 20 26\" fill=\"none\">\n            <path d=\"M10,2 C7,6 4,10 4,15 C4,18.9 6.7,22 10,22 C13.3,22 16,18.9 16,15 C16,10 13,6 10,2Z\" stroke=\"currentColor\" stroke-width=\"1.4\" fill=\"rgba(0,196,222,0.12)\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PARENTS SECTION -->\n      <section class=\"pbox\" aria-label=\"Parent participation\">\n        <p class=\"pbox-lbl\">⚓&nbsp; A Note for Parents<\u002Fp>\n        <p class=\"pbox-note\">\n          Our young Zoran adventurer <b>Felix<\u002Fb> (age 7) falls within the pool's safeguarding\n          rules for under-8s — a <b>minimum of 1 adult per 4 children<\u002Fb> in the water is\n          required during the session. We'd love to know if a parent or guardian\n          would be happy to join the swim!\n        <\u002Fp>\n        <div class=\"choices\">\n          <label class=\"choice\">\n            <input type=\"radio\" name=\"parent-swim\" value=\"yes\" id=\"r-yes\">\n            <span class=\"choice-lbl\">\n              Yes — I'll dive in!\n              <em>&nbsp;(please include me in the ratio)<\u002Fem>\n            <\u002Fspan>\n          <\u002Flabel>\n          <label class=\"choice\">\n            <input type=\"radio\" name=\"parent-swim\" value=\"no\" id=\"r-no\">\n            <span class=\"choice-lbl\">No — I'll cheer from the poolside<\u002Fspan>\n          <\u002Flabel>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- DIVIDER 3 -->\n      <div class=\"div\">\n        <div class=\"div-icon\">\n          <svg width=\"60\" height=\"14\" viewBox=\"0 0 60 14\" fill=\"none\">\n            <path d=\"M0,7 Q7.5,1 15,7 Q22.5,13 30,7 Q37.5,1 45,7 Q52.5,13 60,7\" stroke=\"currentColor\" stroke-width=\"1.5\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RSVP -->\n      <footer class=\"rsvp\" aria-label=\"RSVP details\">\n        <p class=\"rsvp-lbl\">Please RSVP<\u002Fp>\n        <p class=\"rsvp-main\">Kindly reply by <span class=\"ph\">Sunday 28th June&nbsp;<\u002Fspan><\u002Fp>\n        <p class=\"rsvp-contact\">\n          <span class=\"ph\">Mike and Steph<\u002Fspan><br>\n          <span class=\"ph\">WhatsApp: 07843874724<\u002Fspan>&nbsp; · &nbsp;<span class=\"ph\">mike.lee.newell@gmail.com<\u002Fspan>\n        <\u002Fp>\n        <p class=\"closing\">May the currents of Zora's Domain carry you swiftly to our shores.<\u002Fp>\n      <\u002Ffooter>\n\n    <\u002Fdiv>\n  <\u002Farticle>\n<\u002Fdiv>\n\n<!-- PRINT BUTTON -->\n<button class=\"print-btn\" onclick=\"window.print()\" aria-label=\"Print invitation\">\n  <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n    <polyline points=\"6,9 6,2 18,2 18,9\"><\u002Fpolyline>\n    <path d=\"M6,18 H4 C2.9,18 2,17.1 2,16 V11 C2,9.9 2.9,9 4,9 H20 C21.1,9 22,9.9 22,11 V16 C22,17.1 21.1,18 20,18 H18\"><\u002Fpath>\n    <rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect>\n  <\u002Fsvg>\n  Print Invite\n<\u002Fbutton>\n\n<script>\n/* ── CANVAS: UNDERWATER CAUSTIC RAYS ── */\n(function () {\n  var cv = document.getElementById('bg-canvas');\n  var cx = cv.getContext('2d');\n  var W, H, rays;\n\n  function init() {\n    W = cv.width  = window.innerWidth;\n    H = cv.height = window.innerHeight;\n    rays = [];\n    for (var i = 0; i < 22; i++) {\n      rays.push({\n        x:     Math.random() * W,\n        y:     Math.random() * H * 0.75,\n        rw:    28 + Math.random() * 90,\n        rh:    110 + Math.random() * 280,\n        spd:   0.12 + Math.random() * 0.38,\n        ang:   -0.1 + Math.random() * 0.2,\n        a:     0.015 + Math.random() * 0.028,\n        ph:    Math.random() * Math.PI * 2,\n        drift: (Math.random() - 0.5) * 72,\n      });\n    }\n  }\n  init();\n  window.addEventListener('resize', init);\n\n  var t = 0;\n  function frame() {\n    t += 0.0035;\n    cx.clearRect(0, 0, W, H);\n\n    var bg = cx.createLinearGradient(0, 0, 0, H);\n    bg.addColorStop(0,    '#020c18');\n    bg.addColorStop(0.45, '#030e1e');\n    bg.addColorStop(1,    '#020a14');\n    cx.fillStyle = bg;\n    cx.fillRect(0, 0, W, H);\n\n    for (var i = 0; i < rays.length; i++) {\n      var r  = rays[i];\n      var ox = Math.sin(t * r.spd + r.ph) * r.drift;\n      var oy = Math.cos(t * 0.18  + r.ph) * 18;\n      cx.save();\n      cx.translate(r.x + ox, r.y + oy);\n      cx.rotate(r.ang + Math.sin(t * 0.22 + r.ph) * 0.05);\n      var rg = cx.createLinearGradient(0, 0, 0, r.rh);\n      rg.addColorStop(0,   'rgba(0,178,220,' + (r.a * 1.2) + ')');\n      rg.addColorStop(0.5, 'rgba(0,145,195,' + r.a + ')');\n      rg.addColorStop(1,   'rgba(0,90,150,0)');\n      cx.fillStyle = rg;\n      cx.beginPath();\n      cx.ellipse(0, r.rh / 2, r.rw / 2, r.rh / 2, 0, 0, Math.PI * 2);\n      cx.fill();\n      cx.restore();\n    }\n    requestAnimationFrame(frame);\n  }\n  frame();\n}());\n\n/* ── BUBBLES ── */\n(function () {\n  var cont = document.getElementById('bubbles');\n  var n = 0;\n  function spawn() {\n    if (n >= 36) return;\n    var el  = document.createElement('div');\n    el.className = 'bub';\n    var sz  = 3  + Math.random() * 18;\n    var dur = 10 + Math.random() * 18;\n    var del = Math.random() * 5;\n    el.style.cssText =\n      'width:' + sz + 'px;height:' + sz + 'px;' +\n      'left:' + (Math.random() * 100) + '%;' +\n      'animation-duration:' + dur + 's;' +\n      'animation-delay:-' + del + 's;' +\n      '--drift:' + ((Math.random() - 0.5) * 110) + 'px;';\n    cont.appendChild(el);\n    n++;\n    setTimeout(function () { el.remove(); n--; spawn(); }, (dur + del) * 1000);\n  }\n  for (var i = 0; i < 30; i++) spawn();\n}());\n\n/* ── WATER RIPPLE ON CLICK ── */\n(function () {\n  var card = document.querySelector('.card');\n  var style = document.createElement('style');\n  style.textContent = '@keyframes ripOut{from{width:0;height:0;opacity:.7}to{width:260px;height:260px;opacity:0}}';\n  document.head.appendChild(style);\n\n  card.addEventListener('click', function (e) {\n    var rect = card.getBoundingClientRect();\n    var rip  = document.createElement('div');\n    rip.style.cssText =\n      'position:absolute;border-radius:50%;' +\n      'border:1.5px solid rgba(0,196,222,0.55);' +\n      'pointer-events:none;z-index:20;' +\n      'transform:translate(-50%,-50%);' +\n      'animation:ripOut 0.85s ease-out forwards;' +\n      'left:' + (e.clientX - rect.left) + 'px;' +\n      'top:'  + (e.clientY - rect.top)  + 'px;';\n    card.appendChild(rip);\n    setTimeout(function () { rip.remove(); }, 900);\n  });\n}());\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
